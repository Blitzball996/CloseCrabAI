# CloseCrab 配置文件
server:
  port: 9001
  host: "127.0.0.1"

database:
  path: "data/closecrab.db"

logging:
  level: "info"
  file: "logs/closecrab.log"

# LLM 配置
llm:
  model_path: "models/deepseek-moe-16b-chat.Q4_K_M.gguf"
  max_tokens: 8192
  temperature: 0.7

# WebSocket 配置
websocket:
  enabled: true
  port: 9001

# ---- RAG 配置 ----
# 所有模型来自 onnx-community 的预转换仓库
# model.onnx + model.onnx_data 必须放在同一目录
rag:
  # Embedding: onnx-community/bge-small-zh-v1.5-ONNX
  embedding_model_path: "models/bge-small-zh/onnx/model.onnx"
  embedding_tokenizer_path: "models/bge-small-zh/tokenizer.json"
 
  # Reranker: onnx-community/bge-reranker-base-ONNX (或你自己导出的)
  reranker_model_path: "models/bge-reranker-base/onnx/model.onnx"
  reranker_tokenizer_path: "models/bge-reranker-base/tokenizer.json"