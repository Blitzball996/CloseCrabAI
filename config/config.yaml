# CloseCrab 配置文件
server:
  port: 9001
  host: "127.0.0.1"

database:
  path: "data/closecrab.db"

logging:
  level: "info"
  file: "logs/closecrab.log"

# LLM 配置
llm:
  model_path: "models/deepseek-moe-16b-chat.Q4_K_M.gguf"
  max_tokens: 8192
  temperature: 0.7

# WebSocket 配置
websocket:
  enabled: true
  port: 9001

# ---- RAG 配置（新增） ----
rag:
  # Embedding 模型 (BAAI/bge-small-zh-v1.5, ONNX 格式)
  embedding_model_path: "models/bge-small-zh/model.onnx"
  embedding_vocab_path: "models/bge-small-zh/vocab.txt"
 
  # Reranker 模型 (BAAI/bge-reranker-base, ONNX 格式)
  reranker_model_path: "models/bge-reranker-base/model.onnx"
  reranker_vocab_path: "models/bge-reranker-base/vocab.txt"